<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ZeroGuard — Intelligence Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ── BASE & DYNAMIC SIZING ──────────────────────────── */
:root {
  --bg: #0d1117; --sidebar: #161b22; --border: #30363d;
  --text: #c9d1d9; --accent: #58a6ff; --red: #f85149;
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

/* ── RESPONSIVE SHELL ────────────────────────────────── */
.app-container { display: flex; min-height: 100vh; }
.sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); padding: 24px; flex-shrink: 0; }
.main-content { flex: 1; padding: 32px; min-width: 0; }

.logo-box { text-align: center; margin-bottom: 32px; }
.logo-box img { max-width: 100%; border-radius: 8px; height: auto; }

/* Navigation */
.nav-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; 
            color: #8b949e; border-radius: 6px; margin-bottom: 4px; cursor: pointer; transition: 0.2s; }
.nav-item:hover, .nav-item.active { background: #1f242c; color: var(--accent); }
.badge { background: #30363d; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }

/* ── MOBILE ADAPTATION ──────────────────────────────── */
@media (max-width: 900px) {
  .app-container { flex-direction: column; }
  .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border); padding: 16px; }
  .nav-group { display: flex; overflow-x: auto; gap: 8px; padding-bottom: 8px; }
  .nav-item { margin-bottom: 0; white-space: nowrap; font-size: 13px; }
  .main-content { padding: 16px; }
  .kpi-grid { grid-template-columns: 1fr 1fr !important; }
}

/* ── COMPONENTS ─────────────────────────────────────── */
.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 32px; }
.kpi-card { background: var(--sidebar); border: 1px solid var(--border); padding: 20px; border-radius: 8px; }
.kpi-card h3 { font-size: 11px; text-transform: uppercase; color: #8b949e; margin-bottom: 8px; }
.kpi-card .val { font-size: 28px; font-family: 'JetBrains Mono'; font-weight: 600; }

.tab-content { display: none; }
.tab-content.active { display: block; }

/* Table System */
.table-container { background: var(--sidebar); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.table-scroll { overflow-x: auto; width: 100%; }
table { width: 100%; border-collapse: collapse; min-width: 750px; }
th { background: #0d1117; padding: 14px 20px; text-align: left; font-size: 11px; color: #8b949e; text-transform: uppercase; border-bottom: 1px solid var(--border); cursor: pointer; }
td { padding: 14px 20px; border-bottom: 1px solid var(--border); font-size: 13px; }
tr:hover td { background: #1f242c; cursor: pointer; }

/* Pagination Styling */
.pagination { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background: #0d1117; border-top: 1px solid var(--border); }
.pg-btn { background: #21262d; border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: 6px; font-size: 12px; }
.pg-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Modal (Previous Style Reverted) */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 9999; padding: 20px; }
.modal-content { background: var(--sidebar); border: 1px solid var(--border); border-radius: 8px; width: 100%; max-width: 600px; max-height: 85vh; overflow-y: auto; }
.modal-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
.modal-body { padding: 24px; }
.status-tag { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; border: 1px solid; }
</style>
</head>
<body>

<div class="app-container">
  <aside class="sidebar">
    <div class="logo-box"><img src="LOGO - dashboard.jpg" alt="ZeroGuard"></div>
    <nav class="nav-group">
      <div class="nav-item active" onclick="switchTab('overview', this)">Overview</div>
      <div class="nav-item" onclick="switchTab('intel', this)">Threat-Intel <span class="badge" id="b-intel">0</span></div>
      <div class="nav-item" onclick="switchTab('it', this)">IT Vulns <span class="badge" id="b-it">0</span></div>
      <div class="nav-item" onclick="switchTab('ot', this)">OT / ICS <span class="badge" id="b-ot">0</span></div>
      <div class="nav-item" onclick="switchTab('con', this)">Consumer <span class="badge" id="b-con">0</span></div>
    </nav>
  </aside>

  <main class="main-content">
    <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
      <div><h1 id="viewTitle" style="font-size:24px">Operational Command</h1></div>
      <button onclick="initSync()" id="syncBtn" style="background:var(--accent); color:#000; font-weight:700; padding:8px 16px; border-radius:6px;">Update Intelligence</button>
    </header>

    <div id="tab-overview" class="tab-content active">
      <div class="kpi-grid">
        <div class="kpi-card"><h3>Total Events</h3><div class="val" id="k-total">0</div></div>
        <div class="kpi-card"><h3>Critical</h3><div class="val" id="k-crit" style="color:var(--red)">0</div></div>
        <div class="kpi-card"><h3>OT Assets</h3><div class="val" id="k-ot" style="color:#d29922">0</div></div>
        <div class="kpi-card"><h3>Threat Intel</h3><div class="val" id="k-intel" style="color:var(--accent)">0</div></div>
      </div>
      <div style="background:var(--sidebar); border:1px solid var(--border); padding:24px; border-radius:8px; height:350px;">
        <canvas id="mainChart"></canvas>
      </div>
    </div>

    <div id="tab-intel" class="tab-content"><div class="table-container" id="cont-intel"></div></div>
    <div id="tab-it" class="tab-content"><div class="table-container" id="cont-it"></div></div>
    <div id="tab-ot" class="tab-content"><div class="table-container" id="cont-ot"></div></div>
    <div id="tab-con" class="tab-content"><div class="table-container" id="cont-con"></div></div>
  </main>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="m-id" style="font-family:'JetBrains Mono'; color:var(--accent)"></h3>
      <button onclick="closeModal(null, true)" style="color:#8b949e; font-size:24px;">&times;</button>
    </div>
    <div class="modal-body">
      <div id="m-date" style="font-size:12px; color:#8b949e; margin-bottom:12px;"></div>
      <h2 id="m-title" style="margin-bottom:20px; line-height:1.3"></h2>
      <p id="m-desc" style="line-height:1.6; margin-bottom:24px;"></p>
      <div style="background:rgba(88,166,255,0.1); padding:16px; border-radius:6px; margin-bottom:20px;">
        <h4 style="color:var(--accent); font-size:12px; margin-bottom:8px;">RECOMMENDED ACTION</h4>
        <p id="m-action" style="font-size:13px;"></p>
      </div>
      <a id="m-link" href="#" target="_blank" style="color:var(--accent); text-decoration:none; font-weight:600;">View Full Source Advisory ↗</a>
    </div>
  </div>
</div>

<script>
let store = { all: [], intel: [], it: [], ot: [], con: [] };
let pg = { intel: 1, it: 1, ot: 1, con: 1, limit: 12 };
let chartRef = null;

const kwOT = ['siemens','schneider','scada','ics','plc','substation','dnp3','iec 61850','sel ','modbus','industrial','grid'];
const kwCon = ['android','iphone','smart home','xiaomi','tplink','dlink','windows 10','playstation'];

async function initSync() {
  const sBtn = document.getElementById('syncBtn');
  sBtn.textContent = 'Aggregating...';
  store = { all: [], intel: [], it: [], ot: [], con: [] };

  try {
    // CISA KEV
    const r = await fetch("https://corsproxy.io/?https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json");
    if (r.ok) {
      const j = await r.json();
      j.vulnerabilities.forEach(v => {
        store.all.push({ id: v.cveID, title: v.product, desc: v.shortDescription, action: v.requiredAction, date: v.dateAdded, link: `https://nvd.nist.gov/vuln/detail/${v.cveID}`, status: 'KEV Alert' });
      });
    }
  } catch(e) {}

  // RSS Feeds
  const feeds = ["https://www.us-cert.gov/ncas/alerts.xml", "https://www.bleepingcomputer.com/feed/", "https://www.darkreading.com/rss.xml"];
  const p = "https://api.rss2json.com/v1/api.json?rss_url=";
  
  for (const url of feeds) {
    try {
      const res = await fetch(p + encodeURIComponent(url));
      const data = await res.json();
      data.items.forEach(item => {
        store.all.push({ id: 'THREAT-INTEL', title: item.title, desc: item.description.replace(/<[^>]*>/g, ''), action: 'Analyze report for IOCs.', date: item.pubDate, link: item.link, status: 'Intelligence' });
      });
    } catch(e) {}
  }

  // Routing Logic
  store.all.sort((a,b) => new Date(b.date) - new Date(a.date));
  store.all.forEach(i => {
    if (i.id === 'THREAT-INTEL') store.intel.push(i);
    else {
      const txt = (i.title + i.desc).toLowerCase();
      if (kwOT.some(k => txt.includes(k))) store.ot.push(i);
      else if (kwCon.some(k => txt.includes(k))) store.con.push(i);
      else store.it.push(i);
    }
  });

  refreshUI();
  sBtn.textContent = 'Update Intelligence';
}

function refreshUI() {
  ['intel','it','ot','con'].forEach(t => {
    document.getElementById(`b-${t}`).textContent = store[t].length;
    renderTabTable(t);
  });
  document.getElementById('k-total').textContent = store.all.length;
  document.getElementById('k-ot').textContent = store.ot.length;
  document.getElementById('k-intel').textContent = store.intel.length;
  renderChart();
}

function renderTabTable(t) {
  const container = document.getElementById(`cont-${t}`);
  const data = store[t];
  const total = Math.ceil(data.length / pg.limit) || 1;
  const slice = data.slice((pg[t]-1)*pg.limit, pg[t]*pg.limit);

  container.innerHTML = `
    <div class="table-scroll">
      <table>
        <thead><tr><th>Identifier</th><th>Description</th><th>Date</th><th>Status</th></tr></thead>
        <tbody>
          ${slice.map(i => `
            <tr onclick='openModal(${JSON.stringify(i).replace(/'/g, "&apos;")})'>
              <td style="color:var(--accent); font-family:JetBrains Mono;">${i.id}</td>
              <td style="max-width:350px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${i.title}</td>
              <td style="color:#8b949e">${i.date.split(' ')[0]}</td>
              <td><span class="status-tag" style="color:${i.status==='KEV Alert'?'var(--red)':'#d29922'}; border-color:currentColor">${i.status}</span></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
    <div class="pagination">
      <button class="pg-btn" onclick="movePage('${t}',-1)" ${pg[t]===1?'disabled':''}>Previous</button>
      <span style="font-size:12px; color:#8b949e">Page ${pg[t]} of ${total}</span>
      <button class="pg-btn" onclick="movePage('${t}',1)" ${pg[t]===total?'disabled':''}>Next</button>
    </div>
  `;
}

function movePage(t, d) { pg[t]+=d; renderTabTable(t); }

function switchTab(id, el) {
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById(`tab-${id}`).classList.add('active');
  el.classList.add('active');
  document.getElementById('viewTitle').textContent = id.toUpperCase() + " Dashboard";
}

function openModal(d) {
  document.getElementById('m-id').textContent = d.id;
  document.getElementById('m-date').textContent = `Detected: ${d.date}`;
  document.getElementById('m-title').textContent = d.title;
  document.getElementById('m-desc').textContent = d.desc;
  document.getElementById('m-action').textContent = d.action;
  document.getElementById('m-link').href = d.link;
  document.getElementById('modalOverlay').style.display = 'flex';
}

function closeModal(e, force) {
  if (force || e.target.id === 'modalOverlay') document.getElementById('modalOverlay').style.display = 'none';
}

function renderChart() {
  const ctx = document.getElementById('mainChart').getContext('2d');
  if (chartRef) chartRef.destroy();
  chartRef = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['Threat Intel', 'IT Vulns', 'OT Assets', 'Consumer'],
      datasets: [{ label: 'Events Detected', data: [store.intel.length, store.it.length, store.ot.length, store.con.length], backgroundColor: ['#58a6ff', '#8957e5', '#d29922', '#238636'] }]
    },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: '#30363d' } } } }
  });
}

initSync();
</script>
</body>
</html>
