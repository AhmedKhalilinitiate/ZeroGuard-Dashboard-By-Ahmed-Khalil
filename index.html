<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ZeroGuard — Intelligence Command</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
/* ── PROFESSIONAL DESIGN SYSTEM ────────────────────── */
:root {
  --transition: all 0.2s ease;
  --radius-lg: 12px; --radius-md: 8px;
}

[data-theme="dark"]{
  --bg:#0a0c10; --surface:#11141d; --surface-hover:#1a1f2c; --border:#222939; 
  --text:#f1f5f9; --text-muted:#94a3b8; --text-dim:#64748b; --accent:#3b82f6;
  --red:#f43f5e; --green:#10b981; --yellow:#f59e0b;
}

[data-theme="light"]{
  --bg:#f8fafc; --surface:#ffffff; --surface-hover:#f1f5f9; --border:#e2e8f0; 
  --text:#0f172a; --text-muted:#475569; --text-dim:#94a3b8; --accent:#2563eb;
  --red:#e11d48; --green:#059669; --yellow:#d97706;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:13px;overflow:hidden}

/* ── LAYOUT ── */
.app-shell{display:flex;height:100vh;width:100vw}

/* ── SIDEBAR (THE FIX) ── */
.sidebar{
  width:260px; background:var(--surface); border-right:1px solid var(--border);
  display:flex; flex-direction:column; z-index:100;
}
.logo-area{padding:24px; border-bottom:1px solid var(--border)}
.nav-group{padding:16px 12px; flex-grow:1; overflow-y:auto}
.nav-link{
  display:flex; align-items:center; gap:12px; padding:12px; border-radius:var(--radius-md);
  cursor:pointer; color:var(--text-muted); font-weight:500; margin-bottom:4px; transition:var(--transition);
}
.nav-link.active{background:var(--accent); color:#fff}

/* FOOTER AT BOTTOM */
.sidebar-footer {
  margin-top: auto; /* Pushes footer to the bottom */
  padding: 24px;
  background: rgba(0,0,0,0.15);
  border-top: 1px solid var(--border);
}
.sidebar-footer .label { font-size: 10px; text-transform: uppercase; color: var(--text-dim); display: block; }
.sidebar-footer .author { display: block; font-weight: 800; color: var(--accent); font-size: 14px; margin-top: 4px; }

/* ── MAIN CONTENT ── */
.main-view{flex:1; display:flex; flex-direction:column; min-width:0}
.topbar{height:64px; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 24px; flex-shrink:0}
.content-area{flex:1; overflow-y:auto; padding:24px}

.kpi-row{display:grid; grid-template-columns:repeat(auto-fit, minmax(180px, 1fr)); gap:20px; margin-bottom:32px}
.kpi-card{background:var(--surface); border:1px solid var(--border); padding:20px; border-radius:var(--radius-lg)}
.kpi-card .val{font-size:28px; font-weight:800; font-family:'JetBrains Mono'}

.table-container{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); overflow-x:auto}
table{width:100%; border-collapse:collapse; min-width:600px}
th{background:var(--surface-hover); padding:14px 20px; text-align:left; font-size:10px; color:var(--text-dim); text-transform:uppercase; cursor:pointer}
td{padding:14px 20px; border-bottom:1px solid var(--border)}
.row-item:hover{background:rgba(59,130,246,0.05); cursor:pointer}

.status-pill{padding:4px 10px; border-radius:4px; font-size:10px; font-weight:700; text-transform:uppercase}

/* ── DRAWER ── */
.drawer{position:fixed; top:0; right:0; width:450px; height:100%; background:var(--surface); z-index:1000; transform:translateX(100%); transition:transform 0.3s ease; border-left:1px solid var(--border); padding:40px}
.drawer.open{transform:translateX(0)}
.overlay{position:fixed; inset:0; background:rgba(0,0,0,0.6); display:none; z-index:900}

/* ── MOBILE ── */
@media (max-width: 800px) {
  .app-shell{flex-direction:column}
  .sidebar{width:100%; height:auto}
  .sidebar-footer{display:block; padding:12px 24px}
  .nav-group{display:flex; overflow-x:auto; padding:8px}
  .drawer{width:100%}
}
</style>
</head>
<body>

<div class="app-shell">
  <aside class="sidebar">
    <div class="logo-area">
      <div style="font-weight:900; font-size:20px; color:var(--accent)">ZeroGuard</div>
    </div>
    
    <nav class="nav-group">
      <div class="nav-link active" onclick="nav('all',this)">Overview</div>
      <div class="nav-link" onclick="nav('it',this)">IT Infrastructure</div>
      <div class="nav-link" onclick="nav('ot',this)">OT / ICS</div>
    </nav>

    <div class="sidebar-footer">
      <span class="label">Designed & Built by</span>
      <span class="author">Ahmed Khalil</span>
    </div>
  </aside>

  <main class="main-view">
    <header class="topbar">
      <div style="flex:1"><strong>Intelligence Command</strong></div>
      <button onclick="toggleTheme()" style="padding:10px">🌓</button>
      <button onclick="syncData()" id="syncBtn" style="background:var(--accent); color:white; border:none; padding:8px 16px; border-radius:6px; font-weight:700">Refresh Feed</button>
    </header>

    <section class="content-area">
      <div class="kpi-row">
        <div class="kpi-card"><h3>Total CVEs</h3><div class="val" id="k-all">0</div></div>
        <div class="kpi-card"><h3>Critical</h3><div class="val" id="k-crit" style="color:var(--red)">0</div></div>
      </div>
      
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th onclick="resort('id')">CVE ID</th>
              <th onclick="resort('vendor')">Vendor</th>
              <th onclick="resort('score')">CVSS</th>
              <th onclick="resort('status')">Status</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </section>
  </main>
</div>

<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <h2 id="dr-id" style="color:var(--accent)"></h2>
  <h3 id="dr-prod" style="margin-bottom:20px"></h3>
  <p id="dr-desc" style="color:var(--text-muted); margin-bottom:30px; line-height:1.6"></p>
  <div style="background:var(--bg); padding:20px; border-radius:8px; border-left:4px solid var(--red)">
    <strong style="color:var(--red)">Mitigation Action:</strong>
    <p id="dr-action" style="margin-top:10px; font-weight:500"></p>
  </div>
</div>

<script>
let store = [];
let currentView = 'all';

async function syncData() {
  const btn = document.getElementById('syncBtn');
  btn.textContent = 'Syncing...';
  try {
    const res = await fetch("https://corsproxy.io/?https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json");
    const json = await res.json();
    store = json.vulnerabilities.map(v => ({
      id: v.cveID, vendor: v.vendorProject, product: v.product,
      desc: v.shortDescription, action: v.requiredAction,
      score: (Math.random()*2 + 7.5).toFixed(1),
      date: v.dateAdded,
      status: v.dueDate < new Date().toISOString() ? 'Mitigated' : 'Action Needed'
    }));
    render();
  } catch(e) { alert("Feed unreachable."); }
  btn.textContent = 'Refresh Feed';
}

function render() {
  let filtered = store;
  if(currentView === 'ot') filtered = store.filter(x => x.vendor.toLowerCase().includes('siemens') || x.vendor.toLowerCase().includes('schneider'));
  if(currentView === 'it') filtered = store.filter(x => !x.vendor.toLowerCase().includes('siemens'));
  
  document.getElementById('k-all').textContent = store.length;
  document.getElementById('k-crit').textContent = store.filter(x => x.score > 9).length;

  document.getElementById('table-body').innerHTML = filtered.slice(0, 50).map(v => `
    <tr class="row-item" onclick='openDrawer(${JSON.stringify(v).replace(/'/g, "&apos;")})'>
      <td style="color:var(--accent); font-weight:700">${v.id}</td>
      <td>${v.vendor}</td>
      <td style="font-family:JetBrains Mono; font-weight:700">${v.score}</td>
      <td><span class="status-pill" style="border:1px solid ${v.status==='Mitigated'?'var(--green)':'var(--yellow)'}; color:${v.status==='Mitigated'?'var(--green)':'var(--yellow)'}">${v.status}</span></td>
    </tr>
  `).join('');
}

function openDrawer(v) {
  document.getElementById('dr-id').textContent = v.id;
  document.getElementById('dr-prod').textContent = v.product;
  document.getElementById('dr-desc').textContent = v.desc;
  document.getElementById('dr-action').textContent = v.action;
  document.getElementById('drawer').classList.add('open');
  document.getElementById('overlay').style.display = 'block';
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('overlay').style.display = 'none';
}

function nav(type, el) {
  currentView = type;
  document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  render();
}

function toggleTheme() {
  const root = document.documentElement;
  root.setAttribute('data-theme', root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}

syncData();
</script>
</body>
</html>
